; PlatformIO Project Configuration File
; Smart Irrigation System - IoT Project

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200

lib_deps =
    blynkkk/Blynk@^1.3.5
    marcoschwartz/LiquidCrystal_I2C@^1.1.4

build_flags =
    -DCORE_DEBUG_LEVEL=4
    '-DBLYNK_TEMPLATE_ID="TMPL6A9C-Tyxt"'
    '-DBLYNK_TEMPLATE_NAME="PROJEK_IOT_SMART_IRRIGATION"'

upload_speed = 921600